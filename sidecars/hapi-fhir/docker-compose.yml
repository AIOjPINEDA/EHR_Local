services:
  hapi-postgres:
    image: ${LOCAL_HAPI_POSTGRES_IMAGE:-postgres:17.7}
    container_name: consultamed-hapi-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOCAL_HAPI_POSTGRES_PORT:-54330}:5432"
    environment:
      POSTGRES_DB: ${HAPI_DB_NAME:-hapi_fhir}
      POSTGRES_USER: ${HAPI_DB_USER:-hapi}
      POSTGRES_PASSWORD: ${HAPI_DB_PASSWORD:-hapi}
    volumes:
      - hapi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HAPI_DB_USER:-hapi} -d ${HAPI_DB_NAME:-hapi_fhir}"]
      interval: 5s
      timeout: 5s
      retries: 10

  hapi-sidecar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultamed-hapi-sidecar
    restart: unless-stopped
    depends_on:
      hapi-postgres:
        condition: service_healthy
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:///app/config/consultamed.application.yaml
      HAPI_DB_HOST: hapi-postgres
      HAPI_DB_NAME: ${HAPI_DB_NAME:-hapi_fhir}
      HAPI_DB_USER: ${HAPI_DB_USER:-hapi}
      HAPI_DB_PASSWORD: ${HAPI_DB_PASSWORD:-hapi}
      CONSULTAMED_ETL_API_KEY: ${CONSULTAMED_ETL_API_KEY:-consultamed-local-etl}
    ports:
      - "127.0.0.1:${LOCAL_HAPI_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD", "java", "-cp", "/app", "HealthCheck"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

volumes:
  hapi_postgres_data: